<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Christopher Robine favicon</title>
  <desc id="desc">Monogramme CR entre crochets avec dégradé violet et orange.</desc>

  <defs>
    <linearGradient id="cr-gradient" x1="72" y1="80" x2="440" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="38" y="38" width="436" height="436" rx="112" fill="#0F172A" filter="url(#soft-shadow)"/>
  <rect x="51" y="51" width="410" height="410" rx="100" stroke="url(#cr-gradient)" stroke-width="18"/>

  <path d="M151 151H101V361H151" stroke="#7C3AED" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M361 151H411V361H361" stroke="#F97316" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="256" y="294"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Inter, Montserrat, Arial, sans-serif"
        font-size="138"
        font-weight="800"
        letter-spacing="-8"
        fill="url(#cr-gradient)">CR</text>
</svg>
